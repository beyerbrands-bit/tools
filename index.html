<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #010409; color: #c9d1d9; font-family: 'JetBrains Mono', monospace; min-height: 100vh; padding: 40px 20px; }
  .wrap { max-width: 600px; margin: 0 auto; }
  .header { margin-bottom: 40px; }
  .title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
  .title span { color: #58a6ff; }
  .subtitle { font-size: 13px; color: #6e7681; margin-top: 6px; }
  .tools { display: flex; flex-direction: column; gap: 12px; }
  .tool-card {
    background: #0d1117; border: 1px solid #21262d; border-radius: 10px;
    padding: 18px 20px; text-decoration: none; color: inherit;
    display: flex; align-items: center; justify-content: space-between;
    transition: border-color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .tool-card:hover, .tool-card:active { border-color: #58a6ff44; background: #161b22; }
  .tool-icon { font-size: 24px; margin-right: 16px; flex-shrink: 0; }
  .tool-info { flex: 1; }
  .tool-name { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: #fff; }
  .tool-desc { font-size: 12px; color: #6e7681; margin-top: 4px; line-height: 1.5; }
  .tool-arrow { color: #30363d; font-size: 18px; margin-left: 12px; transition: color 0.2s; }
  .tool-card:hover .tool-arrow, .tool-card:active .tool-arrow { color: #58a6ff; }
  .tag { display: inline-block; font-size: 10px; color: #3fb950; background: #3fb95018; border: 1px solid #3fb95033; border-radius: 3px; padding: 1px 7px; margin-top: 6px; letter-spacing: 0.05em; }
  .footer { margin-top: 48px; font-size: 11px; color: #6e7681; border-top: 1px solid #21262d; padding-top: 20px; line-height: 1.7; }
  code { color: #d2a8ff; font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="title">my<span>.</span>tools</div>
    <div class="subtitle">Personal toolbox — open any tool on any device</div>
  </div>

  <div class="tools">
    <a href="./readme-gen/" class="tool-card">
      <span class="tool-icon">📝</span>
      <div class="tool-info">
        <div class="tool-name">README.gen</div>
        <div class="tool-desc">Connect to GitHub, pick a repo, generate a professional README with Claude AI, and push it directly.</div>
        <span class="tag">NEW</span>
      </div>
      <span class="tool-arrow">→</span>
    </a>
    <!-- future tools go here -->
  </div>

  <div class="footer">
    To add a new tool: create a folder, drop in an <code>index.html</code>, and add a card above.
  </div>
</div>
</body>
</html>
